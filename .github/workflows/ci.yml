name: TrueLedger CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: stable

jobs:
# -------------------------
# UNIT + ANALYSIS
# -------------------------
  test:
    name: Unit & Analysis (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze

      # -------------------------
      # TESTS
      # -------------------------
      - name: Run tests (no coverage)
        if: matrix.os != 'ubuntu-latest'
        run: flutter test

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: flutter test --coverage

      # -------------------------
      # FIX COVERAGE PATHS (CRITICAL)
      # -------------------------
      - name: Normalize coverage paths
        if: matrix.os == 'ubuntu-latest'
        run: |
          sed -i 's|/home/runner/work/trueledger/trueledger/||g' coverage/lcov.info

      # Optional sanity check (remove later)
      - name: Debug coverage
        if: matrix.os == 'ubuntu-latest'
        run: head -20 coverage/lcov.info

      # -------------------------
      # REPORT COVERAGE (NO PRs)
      # -------------------------
      - name: Install lcov
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request'
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Report Coverage
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request'
        uses: zgosalvez/github-actions-report-lcov@v7
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 0
          github-token: ${{ secrets.GITHUB_TOKEN }}

# -------------------------
# LINUX INTEGRATION
# -------------------------
  integration-linux:
    name: Integration (Linux)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev \
            libjsoncpp-dev libsqlite3-dev libsqlcipher-dev \
            libssl-dev xvfb libglu1-mesa

      - run: xvfb-run -s "-screen 0 1280x720x24" flutter test integration_test/app_test.dart -d linux --timeout 20m

# -------------------------
# ANDROID INTEGRATION
# -------------------------
  integration-android:
    name: Integration (Android)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: flutter test integration_test/app_test.dart --timeout 25m

# -------------------------
# iOS INTEGRATION
# -------------------------
  integration-ios:
    name: Integration (iOS)
    needs: test
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: |
          flutter pub get
          flutter precache --ios
          cd ios && pod install

      - run: |
          set -euo pipefail

          SIM_NAME="FlutterTester"
          DEVICE_TYPE="iPhone 15"

          UDID=$(xcrun simctl list devices | grep "$SIM_NAME" | head -n 1 | awk -F '[()]' '{print $2}' || true)

          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl create "$SIM_NAME" "$DEVICE_TYPE")
          else
            xcrun simctl shutdown "$UDID" || true
            xcrun simctl erase "$UDID" || true
          fi

          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

          flutter test integration_test/app_test.dart \
            -d "$UDID" \
            --timeout 25m \
            --no-pub

# -------------------------
# macOS INTEGRATION
# -------------------------
  integration-macos:
    name: Integration (macOS)
    needs: test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: |
          brew install sqlcipher
          flutter config --enable-macos-desktop

      - run: flutter pub get
      - run: flutter test integration_test/app_test.dart -d macos --timeout 25m

# -------------------------
# WINDOWS INTEGRATION
# -------------------------
  integration-windows:
    name: Integration (Windows)
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter test integration_test/app_test.dart -d windows --timeout 20m
